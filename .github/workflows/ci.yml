name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:  # manual trigger for e2e re-runs

# Cancel in-flight runs on the same branch when a new push lands —
# avoids wasted minutes on stale commits during fast iteration.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint + Typecheck + Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Stylelint
        run: npm run stylelint

      - name: Prettier (check)
        run: npm run format:check

      - name: Knip (unused code / deps)
        run: npm run knip

  test:
    name: Tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Vitest
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Vite build
        run: npm run build

      - name: Upload dist artefact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  e2e:
    name: Playwright (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]
    # E2E is expensive (Chromium download + 3 viewport projects × full spec
    # suite) and the backend is stubbed via `page.route` so it doesn't add
    # integration coverage that pytest doesn't already provide. Run it only
    # on PRs — every push to a branch doesn't need to wait 5-15 minutes for
    # the browser tests. Add `workflow_dispatch` to manually rerun if needed.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: commitlint (PR commits)
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Audit is informational on PRs — don't block merges on transient advisories,
    # but surface failures so the team sees them.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: npm audit (prod deps, high+)
        run: npm run audit:deps
